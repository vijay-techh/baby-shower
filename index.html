<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shower</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#fff5f7;
  padding:40px;
}
.container{
  max-width:400px;
  margin:auto;
}
img{width:150px;}
input{
  width:90%;
  padding:15px;
  font-size:18px;
  margin-top:20px;
}
button{
  padding:15px 25px;
  margin-top:20px;
  font-size:18px;
  background:black;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>
<div class="container">

<img src="baby_2102805.png" alt="">
<h2>Welcome 👶</h2>
<h3>Enter your name</h3>

<input type="text" id="name" placeholder="Your name">

<br>
<button onclick="next()">Continue →</button>

</div>

<script>
function next(){
  const name = document.getElementById("name").value;

  if(!name){
    alert("Enter your name first");
    return;
  }

  // save name in browser
  localStorage.setItem("username", name);

  // go to vote page
  window.location.href = "vote.html";
}
</script>

</body>
</html>
