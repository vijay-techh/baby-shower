<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shower 👶</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#fff5f7;
  padding:25px;
}

.container{
  max-width:420px;
  margin:auto;
}

.topname{
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

.title{
  font-size:32px;
  margin:10px 0 20px 0;
}

.vote-grid{
  display:flex;
  justify-content:center;
  gap:25px;
  margin-top:20px;
}

.vote-box{
  cursor:pointer;
}

.vote-box img{
  width:150px;
  height:150px;
  object-fit:cover;
  border-radius:15px;
  border:4px solid transparent;
  transition:.2s;
}

.vote-box img:hover{
  transform:scale(1.05);
  border-color:black;
}

.label{
  font-size:20px;
  margin-top:8px;
  font-weight:bold;
}

.result{
  margin-top:30px;
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="topname" id="welcome"></div>
<div class="title">Baby Shower 👶</div>

<div class="vote-grid">

  <!-- BOY -->
  <div class="vote-box" onclick="vote('boy')">
    <img src="/boy.jpeg">
    <div class="label">Baby Boy 💙</div>
  </div>

  <!-- GIRL -->
  <div class="vote-box" onclick="vote('girl')">
    <img src="/girl.jpeg">
    <div class="label">Baby Girl 💖</div>
  </div>

</div>


</div>

<script>
// get name
const name = localStorage.getItem("username");

if(name){
  document.getElementById("welcome").innerText = "Hi " + name + " 👋";
}else{
  window.location.href="index.html";
}

// vote
async function vote(gender){

  await fetch("/vote",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({name, gender})
  });

  showFinalScreen();
}

async function showFinalScreen(){

  const res = await fetch("/results");
  const percent = await res.json();

  const all = await fetch("/allvotes");
  const votes = await all.json();

  let tableRows = votes.map(v => `
      <tr>
        <td style="padding:8px;">${v.name}</td>
        <td style="padding:8px;">${v.gender.toUpperCase()}</td>
      </tr>
  `).join("");

  document.querySelector(".container").innerHTML = `
    <img src="/pic.jpeg" width="170" style="border-radius:15px">
    <h2>🎉 Thank You ${name}!</h2>
    <p>Enjoy the baby shower 👶</p>

    <div style="margin-top:20px;font-size:22px;font-weight:bold;">
      💙 Boy: ${percent.boy}% &nbsp;&nbsp; | &nbsp;&nbsp;
      💖 Girl: ${percent.girl}%
    </div>

    <h3 style="margin-top:25px;">Guest Predictions</h3>

    <table style="width:100%;margin-top:10px;border-collapse:collapse;">
      <tr style="background:#f2f2f2;">
     a   <th style="padding:8px;">Name</th>
        <th style="padding:8px;">Guess</th>
      </tr>
      ${tableRows}
    </table>
  `;
}

</script>

</body>
</html>
