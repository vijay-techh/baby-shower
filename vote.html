<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Vote 👶</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#fff5f7;
  padding:30px;
}

.container{
  max-width:400px;
  margin:auto;
}

img{
  width:150px;
  margin-top:20px;
}

h2{
  margin-top:10px;
}

button{
  padding:15px;
  width:70%;
  margin:15px;
  border:none;
  font-size:20px;
  color:white;
  border-radius:12px;
}

.boy{ background:#2196f3; }
.girl{ background:#ff69b4; }

.result{
  margin-top:25px;
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<img src="/baby_2102805.png" alt="baby">
<h2>Baby Prediction 👶</h2>
<h3 id="welcome"></h3>

<button class="boy" onclick="vote('boy')">Boy 💙</button>
<button class="girl" onclick="vote('girl')">Girl 💖</button>

<div class="result" id="result">Loading results...</div>

</div>

<script>
// get stored name
const name = localStorage.getItem("username");

// show welcome
if(name){
  document.getElementById("welcome").innerText = "Hi " + name + " 👋";
}else{
  window.location.href="index.html";
}

// vote function
async function vote(gender){

  const confirmVote = confirm(`Are you sure it's a ${gender.toUpperCase()}?`);
  if(!confirmVote) return;

  await fetch("/vote",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({name, gender})
  });

  // show thank you screen
  document.querySelector(".container").innerHTML = `
    <img src="/baby_2102805.png" width="150">
    <h2>🎉 Thank You ${name}!</h2>
    <h3>Your vote has been recorded ❤️</h3>
    <p>Enjoy the baby shower 👶</p>
    <br>
    <button onclick="window.location.href='results.html'" 
    style="background:black;padding:15px;color:white;border:none;border-radius:10px">
    View Live Results 📊
    </button>
  `;
}

// load live results
async function loadResults(){
  try{
    const res = await fetch("/results");
    const data = await res.json();

    document.getElementById("result").innerHTML = `
    💙 Boy: ${data.boy}% <br>
    💖 Girl: ${data.girl}%
    `;
  }catch(err){
    document.getElementById("result").innerText="Loading...";
  }
}

// auto refresh every 2 sec
setInterval(loadResults,2000);
loadResults();

</script>

</body>
</html>
